name: CI

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias (lock)
        run: uv sync --frozen

      - name: Verificar imports del curso
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: uv run python scripts/verify_env.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ingenieria-soluciones-ia:ci
